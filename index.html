<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Roadbook Lac de Côme</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0f4c5c"><link rel="apple-touch-icon" href="icon-192.png"><link rel="stylesheet" href="style.css"></head>
<body>
<header><div class="appTop"><div><h1>🏕️ Roadbook Lac de Côme</h1><div class="sub">29/07 → 02/08 · Camping Magic Lake – Dongo</div></div><button class="burger" onclick="openMenu()">☰</button></div><nav class="tabs" id="tabs"></nav></header>
<main id="app"></main>
<div class="menuOverlay" id="menuOverlay" onclick="if(event.target.id==='menuOverlay')closeMenu()"><aside class="sideMenu"><div class="menuHead"><div><h2>Menu</h2><div class="sub">Carnet de voyage</div></div><button class="close" onclick="closeMenu()">×</button></div><div class="stats"><div><b id="stDone">0</b><span>étapes</span></div><div><b id="stPhotos">0</b><span>photos</span></div><div><b id="stNotes">0</b><span>notes</span></div></div><button class="btn menuAction" onclick="closeMenu();openStepModal()">➕ Ajouter une étape</button><button class="btn menuAction secondary" onclick="closeMenu();openPhotos('general')">📸 Ajouter une photo souvenir</button><button class="btn menuAction" onclick="closeMenu();buildExport()">📘 Générer le carnet PDF</button><button class="btn menuAction secondary" onclick="closeMenu();showDay('lexique')">📚 Lexique français / italien</button><button class="btn menuAction secondary" onclick="closeMenu();showDay('infos')">ℹ️ Infos pratiques</button></aside></div>
<div class="modalOverlay" id="photoModal" onclick="if(event.target.id==='photoModal')closePhotos()"><div class="sheet"><div class="sheetHead"><button class="close" onclick="closePhotos()">×</button><h2 id="photoTitle">Photos</h2></div><div class="sheetBody"><div class="actions"><button class="btn" onclick="pickCamera()">📷 Appareil photo</button><button class="btn secondary" onclick="pickGallery()">🖼️ Galerie</button></div><div class="note">Les photos prises restent dans la galerie du téléphone. L’application garde une copie dans IndexedDB.</div><input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none"><input id="galleryInput" type="file" accept="image/*" multiple style="display:none"><div class="photoGrid" id="photoGrid"></div></div></div></div>
<div class="modalOverlay" id="stepModal" onclick="if(event.target.id==='stepModal')closeStepModal()"><div class="sheet"><div class="sheetHead"><button class="close" onclick="closeStepModal()">×</button><h2>Ajouter une étape</h2></div><div class="sheetBody"><div class="field"><label>Jour</label><select id="newStepDay"><option value="day1">Jour 1</option><option value="day2">Jour 2</option><option value="day3">Jour 3</option><option value="day4">Jour 4</option><option value="day5">Jour 5</option></select></div><div class="field"><label>Heure</label><input id="newStepTime" value="12:00"></div><div class="field"><label>Nom de l’étape</label><input id="newStepTitle" placeholder="Ex : Glace à Menaggio"></div><div class="field"><label>Commentaire initial</label><textarea id="newStepComment" placeholder="Note personnelle..."></textarea></div><button class="btn" onclick="addManualStep()">Ajouter</button></div></div></div>
<div class="modalOverlay" id="tourModal" onclick="if(event.target.id==='tourModal')closeTour()"><div class="sheet"><div class="sheetHead"><button class="close" onclick="closeTour()">×</button><h2 id="tourTitle"></h2><div id="tourIntro"></div></div><div class="sheetBody" id="tourBody"></div></div></div>
<section class="exportPanel" id="exportPanel"></section><div class="exportBar"><button class="btn" onclick="window.print()">Imprimer / PDF</button><button class="btn secondary" onclick="downloadExportHTML()">Télécharger HTML</button><button class="btn secondary" onclick="exitExport()">Retour</button></div>
<script src="data.js"></script><script src="db.js"></script><script src="app.js"></script>
</body></html>
