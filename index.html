<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Roadbook Lac de Côme</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f4c5c">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#f6f1e8;--card:#fffaf2;--ink:#22313a;--muted:#6f777b;--brand:#0f4c5c;
  --brand2:#b56b2a;--line:#e2d7c6;--soft:#eef7f2;--ok:#6fa66b;--danger:#b94c3a;
  --blue:#2f7fd3;--pink:#d86ea5;--shadow:0 8px 24px rgba(30,40,45,.10);--r:18px;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;min-height:100%;overflow-x:hidden}
body{
  background:linear-gradient(180deg,#eaf4f6 0,#f6f1e8 240px);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);
}
button,a,input,textarea{font:inherit}
header{
  position:sticky;top:0;z-index:40;background:rgba(246,241,232,.94);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top);
}
.appTop{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px 8px}
h1{margin:0;font-size:20px;line-height:1.05}.sub{font-size:13px;color:var(--muted);margin-top:3px}
.burger{border:1px solid var(--line);background:#fff;color:var(--brand);border-radius:16px;width:46px;height:46px;font-size:24px;font-weight:900;box-shadow:var(--shadow)}
.tabs{display:flex;gap:8px;overflow:auto;padding:0 14px 10px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tabs button{border:0;background:transparent;padding:10px 8px;font-weight:900;color:var(--ink);border-bottom:3px solid transparent;white-space:nowrap}
.tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}
main{width:100%;max-width:960px;margin:0 auto;padding:12px 12px 40px}
.day{display:none}.day.active{display:block}
.card,.stepBox{background:rgba(255,250,242,.96);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.card{padding:14px;margin:12px 0}.card h2,.card h3{margin:0 0 8px}.card p{line-height:1.45}
.tag{display:inline-block;background:#efe8da;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900;color:#66503a;margin:2px}
.note{background:#fff5dc;border-left:5px solid var(--brand2);padding:10px;border-radius:12px;color:#4e3c25;margin-top:10px}
.timeline{display:grid;gap:12px;margin-top:12px}
.step{display:grid;grid-template-columns:54px minmax(0,1fr);gap:10px;width:100%}
.time{font-weight:900;color:var(--brand);font-size:16px;padding-top:16px;text-align:right}
.stepBox{padding:13px;min-width:0;overflow:hidden}
.step.manual .stepBox{border:2px dashed #d8a46c;background:#fffdf7}
.step.done .stepBox{background:#eef8ee;border-color:#b9d8b8;opacity:.76}
.stepHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.stepTitle{font-size:18px;font-weight:900;line-height:1.2}
.check{appearance:none;width:30px;height:30px;border:3px solid var(--line);border-radius:11px;background:#fff;flex:0 0 auto}
.check:checked{background:var(--ok);border-color:var(--ok)}
.meta{font-size:14px;color:var(--muted);line-height:1.45;margin-top:6px}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.btn,a.btn{border:0;text-decoration:none;border-radius:999px;padding:9px 12px;font-weight:900;background:var(--brand);color:white;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.btn.secondary{background:#fff;border:1px solid var(--line);color:var(--brand)}
.btn.info{background:#f3e4cf;color:#7a4318}.btn.danger{background:#fff;border:1px solid #e6b7ad;color:var(--danger)}
.photoStrip{display:flex;gap:8px;overflow:auto;margin-top:10px;padding-bottom:3px}
.thumb{width:72px;height:72px;object-fit:cover;border-radius:14px;border:2px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.12);flex:0 0 auto}
.thumb.favorite{border-color:#d6a636}
.comment{margin-top:10px}.comment label{display:block;color:var(--brand);font-weight:900;font-size:14px;margin-bottom:5px}
.comment textarea{width:100%;min-height:62px;resize:vertical;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff;color:var(--ink)}
.menuOverlay,.modalOverlay{position:fixed;inset:0;background:rgba(10,20,25,.55);z-index:80;display:none;backdrop-filter:blur(4px);overflow:auto}
.menuOverlay.open,.modalOverlay.open{display:block}
.sideMenu{margin-left:auto;width:min(390px,92vw);min-height:100%;background:#fffaf2;border-left:1px solid var(--line);padding:16px;box-shadow:-18px 0 60px rgba(0,0,0,.25)}
.menuHead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}.menuHead h2{margin:0;color:var(--brand)}
.close{border:0;background:#f3e4cf;color:#7a4318;border-radius:999px;width:40px;height:40px;font-size:24px;font-weight:900}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.stats div{background:#fff;border:1px solid var(--line);border-radius:16px;text-align:center;padding:10px}
.stats b{display:block;font-size:22px;color:var(--brand)}.stats span{font-size:12px;color:var(--muted)}
.menuAction{width:100%;justify-content:flex-start;margin:7px 0;border-radius:16px;padding:14px}
.sheet{max-width:760px;margin:24px auto;background:#fffaf2;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.28)}
.sheetHead{background:linear-gradient(135deg,var(--brand),#19708a);color:white;padding:16px}.sheetHead h2{margin:0}.sheetHead .close{float:right;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:white}
.sheetBody{padding:14px}.field{display:grid;gap:5px;margin:10px 0}.field label{font-weight:900;color:var(--brand)}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff}
.photoGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}.photoCard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:9px}.photoCard img{width:100%;height:210px;object-fit:cover;border-radius:12px}
.tourBlock{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0}.tourBlock h4{margin:0 0 6px;color:var(--brand)}.tourBlock p,.tourBlock li{font-size:14px;line-height:1.5}
.lexCat{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}.phrase{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0}.fr{font-weight:900}.it{font-size:18px;color:var(--brand);font-weight:900;margin-top:4px}.pron{font-size:12px;color:var(--muted)}
.exportPanel{display:none}
.exportBar{display:none;position:fixed;left:0;right:0;bottom:0;background:#fffaf2;border-top:1px solid var(--line);padding:10px;z-index:120;gap:8px;justify-content:center}
body.exportMode header,body.exportMode main,body.exportMode .menuOverlay,body.exportMode .modalOverlay{display:none!important}
body.exportMode .exportPanel{display:block;background:white;color:#222;padding:24px;max-width:900px;margin:0 auto;font-family:Arial,sans-serif}
body.exportMode .exportBar{display:flex}
.cover{min-height:520px;display:flex;flex-direction:column;justify-content:center;text-align:center;border-bottom:2px solid #ddd;margin-bottom:24px}.cover h1{font-size:36px;margin:0 0 8px}.cover p{font-size:18px;color:#555}
.exportSouvenirs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:18px 0}.exportSouvenirs img{width:150px;height:105px;object-fit:cover;border-radius:12px}
.exportDay{break-before:page}.exportStep{break-inside:avoid;border-bottom:1px solid #ddd;padding:16px 0}.exportStep h3{margin:0 0 6px;color:#0f4c5c}
.exportPhotos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.exportPhotos img{width:100%;height:135px;object-fit:cover;border-radius:10px}.exportPhotos img.main{grid-column:span 3;height:320px;border:4px solid #0f4c5c}
.exportComment{background:#f7f1e7;border-left:5px solid #b56b2a;padding:10px;margin:8px 0;white-space:pre-wrap}.exportTour{font-size:13px;color:#444;line-height:1.45}
@media(max-width:640px){
  main{padding:10px 8px 34px}.step{grid-template-columns:46px minmax(0,1fr);gap:8px}.time{font-size:15px}.stepBox{padding:12px}.actions{gap:7px}.btn{padding:8px 10px}.photoGrid{grid-template-columns:1fr}.photoCard img{height:260px}
  h1{font-size:19px}.sub{font-size:12px}.tabs button{padding:9px 7px}
}
@media print{
  body.exportMode .exportBar{display:none!important}
  body.exportMode .exportPanel{display:block!important;padding:0}
}
</style>
</head>
<body>
<header>
  <div class="appTop">
    <div><h1>🏕️ Roadbook Lac de Côme</h1><div class="sub">29/07 → 02/08 · Camping Magic Lake – Dongo</div></div>
    <button class="burger" onclick="openMenu()">☰</button>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<main id="app"></main>

<div class="menuOverlay" id="menuOverlay" onclick="if(event.target.id==='menuOverlay')closeMenu()">
  <aside class="sideMenu">
    <div class="menuHead"><div><h2>Menu</h2><div class="sub">Carnet de voyage</div></div><button class="close" onclick="closeMenu()">×</button></div>
    <div class="stats"><div><b id="stDone">0</b><span>étapes</span></div><div><b id="stPhotos">0</b><span>photos</span></div><div><b id="stNotes">0</b><span>notes</span></div></div>
    <button class="btn menuAction" onclick="closeMenu();openStepModal()">➕ Ajouter une étape</button>
    <button class="btn menuAction secondary" onclick="closeMenu();openPhotos('general')">📸 Ajouter une photo souvenir</button>
    <button class="btn menuAction" onclick="closeMenu();buildExport()">📘 Générer le carnet PDF</button>
    <button class="btn menuAction secondary" onclick="closeMenu();showDay('lexique')">📚 Lexique français / italien</button>
    <button class="btn menuAction secondary" onclick="closeMenu();showDay('infos')">ℹ️ Infos pratiques</button>
  </aside>
</div>

<div class="modalOverlay" id="photoModal" onclick="if(event.target.id==='photoModal')closePhotos()">
  <div class="sheet"><div class="sheetHead"><button class="close" onclick="closePhotos()">×</button><h2 id="photoTitle">Photos</h2></div>
    <div class="sheetBody">
      <div class="actions"><button class="btn" onclick="pickCamera()">📷 Appareil photo</button><button class="btn secondary" onclick="pickGallery()">🖼️ Galerie</button></div>
      <div class="note">Les photos prises restent dans la galerie du téléphone. L’application garde une copie compressée pour le carnet.</div>
      <input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none">
      <input id="galleryInput" type="file" accept="image/*" multiple style="display:none">
      <div class="photoGrid" id="photoGrid"></div>
    </div>
  </div>
</div>

<div class="modalOverlay" id="stepModal" onclick="if(event.target.id==='stepModal')closeStepModal()">
  <div class="sheet"><div class="sheetHead"><button class="close" onclick="closeStepModal()">×</button><h2>Ajouter une étape</h2></div>
    <div class="sheetBody">
      <div class="field"><label>Jour</label><select id="newStepDay"><option value="day1">Jour 1</option><option value="day2">Jour 2</option><option value="day3">Jour 3</option><option value="day4">Jour 4</option><option value="day5">Jour 5</option></select></div>
      <div class="field"><label>Heure</label><input id="newStepTime" value="12:00"></div>
      <div class="field"><label>Nom de l’étape</label><input id="newStepTitle" placeholder="Ex : Glace à Menaggio"></div>
      <div class="field"><label>Commentaire initial</label><textarea id="newStepComment" placeholder="Note personnelle..."></textarea></div>
      <button class="btn" onclick="addManualStep()">Ajouter</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="tourModal" onclick="if(event.target.id==='tourModal')closeTour()">
  <div class="sheet"><div class="sheetHead"><button class="close" onclick="closeTour()">×</button><h2 id="tourTitle"></h2><div id="tourIntro"></div></div><div class="sheetBody" id="tourBody"></div></div>
</div>

<section class="exportPanel" id="exportPanel"></section>
<div class="exportBar"><button class="btn" onclick="window.print()">Imprimer / PDF</button><button class="btn secondary" onclick="downloadExportHTML()">Télécharger HTML</button><button class="btn secondary" onclick="exitExport()">Retour</button></div>

<script>
const DATA = [
 {id:'day1', label:'Jour 1', title:'Jour 1 – Mercredi 29/07 · Pontarlier → Dongo', tags:['Route alpine','Installation camping','Balade Dongo'], note:'Objectif : arriver sans stress, s’installer, puis découvrir Dongo tranquillement en soirée.', steps:[

  {id:'j1-2',time:'10:45',title:'Pause Simplon / Suisse',meta:'Pause courte conseillée avant la descente vers l’Italie.',actions:[['GPS Simplon','https://maps.google.com/?q=Simplon+Pass','map']],tour:'simplon'},

  {id:'j1-4',time:'16:00',title:'Arrivée Camping Magic Lake',meta:'Via Vigna del Lago 60, 22014 Dongo CO. Installation et repérage.',actions:[['GPS camping','https://maps.google.com/?q=Camping+Magic+Lake+Via+Vigna+del+Lago+60+Dongo','map'],['Site camping','https://www.magiclake.it/','site']]},
  {id:'j1-5',time:'18:15',title:'Balade à Dongo',meta:'Front de lac, vieux port, centre historique.',actions:[['Centre de Dongo','https://maps.google.com/?q=Dongo+CO+Italy','map']],tour:'dongo'}
 ]},

  {id:'j2-4',time:'10:00',title:'Varenna',meta:'Village de pêcheurs, ruelles, Passeggiata degli Innamorati.',actions:[['GPS','https://maps.google.com/?q=Varenna','map']],tour:'varenna'},
  {id:'j2-5',time:'11:30',title:'Villa Monastero',meta:'Ancien monastère devenu villa-musée avec jardins.',actions:[['GPS','https://maps.google.com/?q=Villa+Monastero+Varenna','map'],['Site','https://www.villamonastero.eu/','site']],tour:'monastero'},
  {id:'j2-6',time:'15:00',title:'Bellagio',meta:'Centre historique, ruelles en escalier, basilique San Giacomo.',actions:[['GPS','https://maps.google.com/?q=Bellagio+Lake+Como','map']],tour:'bellagio'},
  {id:'j2-7',time:'16:30',title:'Jardins de la Villa Melzi',meta:'Jardins historiques du XIXe siècle.',actions:[['GPS','https://maps.google.com/?q=Villa+Melzi+Bellagio','map'],['Site','https://giardinidivillamelzi.it/en/','site']],tour:'melzi'}
 ]},

  {id:'j3-4',time:'14:00',title:'Greenway Lenno → Tremezzo',meta:'Balade facile sur une portion de la Greenway del Lago di Como.',actions:[['GPS','https://maps.google.com/?q=Greenway+del+Lago+di+Como+Lenno+Tremezzo','map'],['Site','https://greenwaylagodicomo.com/en/','site']],tour:'greenway'},

 ]},

  {id:'j4-2',time:'09:15',title:'Parking Gravedona',meta:'Se garer près du front de lac ou du centre.',actions:[['GPS parking','https://maps.google.com/?q=Parcheggio+Gravedona+lungolago','map']]},

 ferry:{title:'Les ferries du centre du lac',intro:'Le moyen le plus simple pour relier Menaggio, Varenna et Bellagio.',blocks:['Le ferry évite les routes étroites et les parkings compliqués. Arriver 15 à 20 minutes avant et vérifier les horaires la veille.']},
 varenna:{title:'Varenna',intro:'Ancien village de pêcheurs, coloré et romantique.',blocks:['Varenna se découvre à pied : port, ruelles, Passeggiata degli Innamorati et vues vers Bellagio.']},
 monastero:{title:'Villa Monastero',intro:'Ancien monastère devenu villa-musée.',blocks:['Les jardins longent le lac avec terrasses, essences exotiques et vues sur le centre du lac.']},
 bellagio:{title:'Bellagio',intro:'La perle du lac de Côme.',blocks:['Bellagio occupe une position exceptionnelle au point où les branches du lac se rejoignent. Monter dans les ruelles permet d’éviter un peu la foule des quais.']},
 melzi:{title:'Jardins de la Villa Melzi',intro:'Élégance romantique du XIXe siècle.',blocks:['Créés pour Francesco Melzi d’Eril, proche de Napoléon, ces jardins offrent une promenade douce au bord de l’eau.']},
 balbianello:{title:'Villa del Balbianello',intro:'Le promontoire mythique de Lenno.',blocks:['Construite à la fin du XVIIIe siècle sur un ancien couvent franciscain, la villa est célèbre pour sa loggia panoramique et ses tournages, notamment James Bond et Star Wars.']},
 greenway:{title:'Greenway del Lago di Como',intro:'Villages et villas à pied.',blocks:['La Greenway relie des villages de la rive ouest et permet de découvrir églises, villas, ruelles et vues sur Bellagio.']},
 carlotta:{title:'Villa Carlotta',intro:'Art et jardins botaniques.',blocks:['Demeure historique de Tremezzo, Villa Carlotta associe collections d’art, architecture aristocratique et grands jardins botaniques.']},
 gravedona:{title:'Gravedona',intro:'Bourg historique du haut lac.',blocks:['Gravedona offre une ambiance plus authentique que le centre du lac, avec un beau front de lac et un patrimoine roman important.']},
 tiglio:{title:'Santa Maria del Tiglio',intro:'Joyau roman de Gravedona.',blocks:['L’église est remarquable par l’alternance de pierres claires et sombres et par sa silhouette très sobre au bord du lac.']},
 piona:{title:'Abbaye de Piona',intro:'Cloître roman et silence monastique.',blocks:['Située sur une presqu’île, l’abbaye offre une parenthèse paisible entre cloître, église, panorama et boutique monastique.']},
 bard:{title:'Fort de Bard',intro:'Verrou de la Vallée d’Aoste.',blocks:['Le fort contrôlait un passage stratégique et ralentit Napoléon en 1800. Les ascenseurs panoramiques rendent la visite facile.']},
 aosta:{title:'Aoste',intro:'La Rome des Alpes.',blocks:['Fondée sous le nom d’Augusta Praetoria, Aoste conserve l’Arc d’Auguste, la Porta Praetoria, le théâtre romain et un centre ancien très agréable.']},
 gsb:{title:'Grand-Saint-Bernard',intro:'Col historique ou tunnel rapide.',blocks:['Le col offre une vraie ambiance alpine si la météo est favorable. Le tunnel est préférable en cas de fatigue, retard ou météo incertaine.']}
};

const LEXIQUE = [
 ['Bonjour','Buongiorno','bou-on-djor-no'],['Bonsoir','Buonasera',''],['Au revoir','Arrivederci',''],['Merci beaucoup','Grazie mille',''],['S’il vous plaît','Per favore',''],['Excusez-moi','Mi scusi',''],['Je ne parle pas italien.','Non parlo italiano.',''],['Parlez-vous français ?','Parla francese?',''],['Pouvez-vous parler plus lentement ?','Può parlare più lentamente?',''],['Où sont les toilettes ?','Dov’è il bagno?',''],['Avez-vous des options sans gluten ?','Avete opzioni senza glutine?',''],['Je suis cœliaque, il faut éviter toute contamination.','Sono celiaco/a, bisogna evitare qualsiasi contaminazione.',''],['À quelle heure part le prochain ferry ?','A che ora parte il prossimo traghetto?',''],['Où peut-on payer le parking ?','Dove si paga il parcheggio?',''],['Nous avons une réservation.','Abbiamo una prenotazione.',''],['L’addition, s’il vous plaît.','Il conto, per favore.','']
];

let currentDay='day1', currentPhotoStep='general';

function init(){
 renderTabs();
 renderApp();
 loadFreeSteps();
 showDay(localStorage.getItem('currentDay')||'day1');
 updateStats();
 if('serviceWorker' in navigator && location.protocol.startsWith('http')) navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
}
function renderTabs(){
 const tabs=document.getElementById('tabs'); tabs.innerHTML='';
 [...DATA.map(d=>[d.id,d.label]),['lexique','Lexique'],['infos','Infos']].forEach(([id,label])=>{
  const b=document.createElement('button'); b.textContent=label; b.onclick=()=>showDay(id); b.id='tab-'+id; tabs.appendChild(b);
 });
}
function renderApp(){
 const app=document.getElementById('app'); app.innerHTML='';
 DATA.forEach(day=>app.appendChild(renderDay(day)));
 app.appendChild(renderLexique());
 app.appendChild(renderInfos());
}
function renderDay(day){
 const sec=document.createElement('section'); sec.className='day'; sec.id=day.id;
 sec.innerHTML=`<div class="card"><h2>${esc(day.title)}</h2>${day.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}<div class="note">${esc(day.note)}</div></div><div class="timeline" id="tl-${day.id}"></div>`;
 const tl=sec.querySelector('.timeline');
 day.steps.forEach(st=>tl.appendChild(renderStep(st,day.id,false)));
 return sec;
}
function renderStep(st,dayId,manual){
 const div=document.createElement('div'); div.className='step'+(manual?' manual':''); div.dataset.id=st.id; div.dataset.day=dayId;
 const checked=getDone(st.id)?'checked':'';
 div.innerHTML=`<div class="time">${esc(st.time||'')}</div><div class="stepBox">
  <div class="stepHead"><div class="stepTitle">${esc(st.title)}</div><input class="check" type="checkbox" ${checked}></div>
  <div class="meta">${esc(st.meta||'')}</div>
  <div class="actions">
   ${(st.actions||[]).map(a=>`<a class="btn ${a[2]==='site'?'secondary':''}" target="_blank" href="${a[1]}">${esc(a[0])}</a>`).join('')}
   ${st.tour?`<button class="btn info" onclick="openTour('${st.tour}')">ℹ️ Infos tourisme</button>`:''}
   <button class="btn secondary" onclick="openPhotos('${st.id}')">📸 Photo</button>
   ${manual?`<button class="btn danger" onclick="deleteManualStep('${st.id}')">Supprimer</button>`:''}
  </div>
  <div class="photoStrip" id="strip-${st.id}"></div>
  <div class="comment"><label>📝 Commentaire souvenir</label><textarea placeholder="Note personnelle sur cette étape..." oninput="setComment('${st.id}',this.value)">${esc(getComment(st.id))}</textarea></div>
 </div>`;
 const cb=div.querySelector('.check'); cb.onchange=()=>{setDone(st.id,cb.checked);div.classList.toggle('done',cb.checked);updateStats();};
 div.classList.toggle('done',!!checked);
 setTimeout(()=>renderStrip(st.id),0);
 return div;
}
function renderLexique(){
 const sec=document.createElement('section'); sec.className='day'; sec.id='lexique';
 sec.innerHTML='<div class="card"><h2>Lexique français / italien</h2><div class="note">Phrases courantes à montrer ou lire sur place.</div><div id="lexList"></div></div>';
 sec.querySelector('#lexList').innerHTML=LEXIQUE.map(p=>`<div class="phrase"><div class="fr">${esc(p[0])}</div><div class="it">${esc(p[1])}</div>${p[2]?`<div class="pron">${esc(p[2])}</div>`:''}</div>`).join('');
 return sec;
}
function renderInfos(){
 const sec=document.createElement('section'); sec.className='day'; sec.id='infos';
 sec.innerHTML='<div class="card"><h2>Infos pratiques</h2><h3>Stationnement</h3><p>🟦 Lignes bleues : payant · ⬜ lignes blanches : gratuit ou limité · 🟨 lignes jaunes : réservé.</p><h3>Sans gluten</h3><p><b>Avete opzioni senza glutine?</b> = Avez-vous des options sans gluten ?</p><div class="actions"><a class="btn secondary" target="_blank" href="https://www.navigazionelaghi.it/en/tickets-and-timetables-lake-como/">Ferries officiels</a><a class="btn secondary" target="_blank" href="https://fondoambiente.it/villa-del-balbianello-eng">Villa Balbianello</a></div></div>';
 return sec;
}
function showDay(id){currentDay=id;document.querySelectorAll('.day').forEach(x=>x.classList.remove('active'));document.getElementById(id)?.classList.add('active');document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));document.getElementById('tab-'+id)?.classList.add('active');localStorage.setItem('currentDay',id);window.scrollTo(0,0)}
function openMenu(){updateStats();document.getElementById('menuOverlay').classList.add('open')}
function closeMenu(){document.getElementById('menuOverlay').classList.remove('open')}
function updateStats(){
 const done=Object.keys(getObj('done')).filter(k=>getObj('done')[k]).length;
 const ids=['general',...document.querySelectorAll('.step')].map(x=>typeof x==='string'?x:x.dataset.id);
 const photos=ids.reduce((n,id)=>n+getPhotos(id).length,0);
 const notes=ids.reduce((n,id)=>n+(getComment(id).trim()?1:0),0);
 stDone.textContent=done;stPhotos.textContent=photos;stNotes.textContent=notes;
}
function getObj(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return {}}}
function setObj(k,o){localStorage.setItem(k,JSON.stringify(o))}
function getDone(id){return !!getObj('done')[id]} function setDone(id,v){const o=getObj('done');o[id]=v;setObj('done',o)}
function getComment(id){return localStorage.getItem('comment-'+id)||''} function setComment(id,v){localStorage.setItem('comment-'+id,v||'');updateStats()}
function getPhotos(id){try{return JSON.parse(localStorage.getItem('photos-'+id)||'[]')}catch(e){return []}}
function savePhotos(id,arr){try{localStorage.setItem('photos-'+id,JSON.stringify(arr));}catch(e){alert('Stockage plein : supprime quelques photos.')}updateStats();renderStrip(id)}
function renderStrip(id){const el=document.getElementById('strip-'+id)||document.getElementById('strip-general');if(!el)return;const arr=getPhotos(id).slice(-10);el.innerHTML=arr.map(p=>`<img class="thumb ${p.favorite?'favorite':''}" src="${p.data}">`).join('')}
function openPhotos(id){currentPhotoStep=id;photoTitle.textContent=id==='general'?'Photos souvenir du voyage':'Photos de cette étape';renderPhotoGrid();photoModal.classList.add('open')}
function closePhotos(){photoModal.classList.remove('open')}
function pickCamera(){cameraInput.onchange=()=>handleFiles(cameraInput.files);cameraInput.value='';cameraInput.click()}
function pickGallery(){galleryInput.onchange=()=>handleFiles(galleryInput.files);galleryInput.value='';galleryInput.click()}
async function handleFiles(files){if(!files?.length)return;const arr=getPhotos(currentPhotoStep);for(const f of files){arr.push({id:String(Date.now()+Math.random()),data:await compress(f),date:new Date().toISOString(),favorite:false})}savePhotos(currentPhotoStep,arr);renderPhotoGrid()}
function compress(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,max=1200;if(Math.max(w,h)>max){const ratio=max/Math.max(w,h);w=Math.round(w*ratio);h=Math.round(h*ratio)}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',.76))};img.onerror=rej;img.src=r.result};r.onerror=rej;r.readAsDataURL(file)})}
function renderPhotoGrid(){const arr=getPhotos(currentPhotoStep);photoGrid.innerHTML=arr.length?'':'<div class="note">Aucune photo.</div>';arr.forEach((p,i)=>{const c=document.createElement('div');c.className='photoCard';c.innerHTML=`<img src="${p.data}"><div class="actions"><button class="btn secondary ${p.favorite?'photoFav':''}">${p.favorite?'⭐ Favorite':'☆ Favorite'}</button><button class="btn danger">Supprimer</button></div>`;c.querySelectorAll('button')[0].onclick=()=>{const a=getPhotos(currentPhotoStep);a.forEach(x=>x.favorite=false);a[i].favorite=true;savePhotos(currentPhotoStep,a);renderPhotoGrid()};c.querySelectorAll('button')[1].onclick=()=>{const a=getPhotos(currentPhotoStep);a.splice(i,1);savePhotos(currentPhotoStep,a);renderPhotoGrid()};photoGrid.appendChild(c)})}
function openStepModal(){newStepDay.value=currentDay.startsWith('day')?currentDay:'day4';newStepTitle.value='';newStepComment.value='';stepModal.classList.add('open')}
function closeStepModal(){stepModal.classList.remove('open')}
function addManualStep(){const title=newStepTitle.value.trim();if(!title)return alert('Nom de l’étape obligatoire.');const st={id:'free-'+Date.now(),time:newStepTime.value.trim(),title,meta:newStepComment.value.trim()||'Étape ajoutée manuellement.',actions:[],manual:true};const dayId=newStepDay.value;document.getElementById('tl-'+dayId).appendChild(renderStep(st,dayId,true));const arr=getFreeSteps();arr.push({...st,dayId});setObj('freeSteps',arr);if(newStepComment.value.trim())setComment(st.id,newStepComment.value.trim());closeStepModal();showDay(dayId);updateStats()}
function getFreeSteps(){try{return JSON.parse(localStorage.getItem('freeSteps')||'[]')}catch(e){return []}}
function loadFreeSteps(){getFreeSteps().forEach(st=>document.getElementById('tl-'+st.dayId)?.appendChild(renderStep(st,st.dayId,true)))}
function deleteManualStep(id){if(!confirm('Supprimer cette étape ?'))return;document.querySelector(`.step[data-id="${id}"]`)?.remove();setObj('freeSteps',getFreeSteps().filter(x=>x.id!==id));localStorage.removeItem('comment-'+id);localStorage.removeItem('photos-'+id);updateStats()}
function openTour(k){const t=TOURS[k];if(!t)return;tourTitle.textContent=t.title;tourIntro.textContent=t.intro;tourBody.innerHTML=t.blocks.map(b=>`<div class="tourBlock"><p>${esc(b)}</p></div>`).join('');tourModal.classList.add('open')}
function closeTour(){tourModal.classList.remove('open')}
function buildExport(){
 const steps=[...document.querySelectorAll('.step')].filter(st=>st.querySelector('.check').checked);
 if(!steps.length)return alert('Coche au moins une étape.');
 const gen=getPhotos('general');let out=`<div class="cover"><h1>Lac de Côme</h1><p>29 juillet → 2 août 2026</p><p>Camping Magic Lake – Dongo</p><p>${steps.length} étapes réalisées</p>${gen.length?'<div class="exportSouvenirs">'+gen.slice(0,8).map(p=>`<img src="${p.data}">`).join('')+'</div>':''}</div>`;
 let cur='';
 steps.forEach(st=>{const day=st.closest('.day').querySelector('.card h2')?.textContent||'';if(day!==cur){cur=day;out+=`<section class="exportDay"><h2>${esc(day)}</h2></section>`}const id=st.dataset.id,title=st.querySelector('.stepTitle').textContent,time=st.querySelector('.time').textContent,photos=getPhotos(id),fav=photos.find(p=>p.favorite)||photos[0],ordered=fav?[fav,...photos.filter(p=>p.id!==fav.id)]:photos;out+=`<article class="exportStep"><h3>✔ ${esc(title)}</h3><div><b>Heure prévue :</b> ${esc(time)}</div>${ordered.length?'<div class="exportPhotos">'+ordered.map((p,i)=>`<img class="${i===0?'main':''}" src="${p.data}">`).join('')+'</div>':''}${getComment(id)?`<div class="exportComment">${esc(getComment(id))}</div>`:''}</article>`});
 exportPanel.innerHTML=out;document.body.classList.add('exportMode');
}
function exitExport(){document.body.classList.remove('exportMode')}
function downloadExportHTML(){const blob=new Blob(['<!doctype html><meta charset="utf-8"><title>Carnet</title>'+exportPanel.outerHTML],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='carnet-lac-de-come.html';a.click()}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
init();
</script>
</body>
</html>
